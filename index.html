<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bab Al-Khaleej Pitch Deck</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="device-wrapper">
        <div class="iphone-frame">
            <div class="notch"></div>
            
            <div class="content-area" id="deck-content">
                <div class="header-meta">
                    <span class="badge">DECK S26 MASTER</span>
                    <span class="counter" id="slide-counter">1 / 12</span>
                </div>
                
                <h2 class="slide-title" id="slide-title"></h2>
                <div id="slide-body" class="slide-body"></div>
            </div>

            <div class="controls">
                <button id="prev-btn" class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <button id="next-btn" class="btn-primary">
                    <span id="next-btn-text">CONTINUE</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
